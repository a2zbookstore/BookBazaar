<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback description — SSR injector overwrites this at request time -->
    <meta name="description" content="A2Z Bookshop (a2zbookshop.com) — Your trusted online bookstore for new &amp; used books. Browse 1000s of titles across fiction, non-fiction, children's, academic &amp; more. Filter by genre, condition or price. Secure checkout via PayPal, Stripe &amp; Razorpay. Worldwide shipping." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="A2Z BOOKSHOP" />
    <meta name="theme-color" content="#4F46E5" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="3f1f69d826ddb6a4" />
    
    <!-- Google Fonts (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    
    <!-- Favicon — Google requires 48x48 or multiple of 48px for search result icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon.png" />
    
    <title>A2Z BOOKSHOP — Buy Books Online | New & Used Books | Worldwide Shipping</title>
    
    <!-- Structured Data for Brand — SSR injector will replace with per-route schemas -->
    <!-- Static fallback for crawlers that don't execute SSR -->
    <script type="application/ld+json" id="static-org-schema">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "A2Z BOOKSHOP",
      "alternateName": ["A2Z Bookshop", "A2Z Book Shop", "a2zbookshop", "a2z bookshop", "a2z books", "a2z book store", "A to Z Bookshop", "a-to-z bookshop", "a2zbookshop.com"],
      "url": "https://a2zbookshop.com",
      "logo": "https://a2zbookshop.com/logo.jpeg",
      "image": [
        "https://a2zbookshop.com/logo.jpeg",
        "https://a2zbookshop.com/favicon.png"
      ],
      "description": "Your trusted online bookstore for new & used books. Browse 1000s of titles across fiction, non-fiction, children's, academic & more. Secure checkout & worldwide shipping.",
      "sameAs": [
        "https://www.instagram.com/a2zbookshop",
        "https://www.facebook.com/a2zbookshop"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      }
    }
    </script>
    
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
